<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="380" viewBox="0 0 1200 380" role="img" aria-label="AI Study Assistant — Summarize, highlight, translate and narrate your study material">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#18181b"/>
      <stop offset="0.55" stop-color="#3f3f46"/>
      <stop offset="1" stop-color="#71717a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.25" r="0.6">
      <stop offset="0" stop-color="#ef4444" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ef4444" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="380" rx="20" fill="url(#bg)"/>
  <rect width="1200" height="380" rx="20" fill="url(#glow)"/>

  <!-- MOTIF: open book + graduation cap + spark, gold line-art -->
  <g transform="translate(980,190)" stroke="#ef4444" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.92">
    <!-- open book -->
    <path d="M-90 40 C -60 22, -20 22, 0 36 C 20 22, 60 22, 90 40"/>
    <path d="M-90 40 L -90 -8 C -60 -26, -20 -26, 0 -12 C 20 -26, 60 -26, 90 -8 L 90 40"/>
    <line x1="0" y1="-12" x2="0" y2="36"/>
    <!-- graduation cap above -->
    <path d="M0 -86 L 64 -62 L 0 -38 L -64 -62 Z"/>
    <path d="M-34 -50 L -34 -28 C -16 -16, 16 -16, 34 -28 L 34 -50"/>
    <line x1="64" y1="-62" x2="64" y2="-34"/>
    <circle cx="64" cy="-30" r="4" fill="#ef4444" stroke="none"/>
    <!-- spark -->
    <g transform="translate(-92,-66)">
      <line x1="0" y1="-12" x2="0" y2="-2"/>
      <line x1="0" y1="2" x2="0" y2="12"/>
      <line x1="-12" y1="0" x2="-2" y2="0"/>
      <line x1="2" y1="0" x2="12" y2="0"/>
    </g>
  </g>

  <!-- wordmark -->
  <text x="80" y="160" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="70" font-weight="800" fill="#ffffff">AI Study Assistant</text>
  <text x="84" y="228" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="30" fill="#ef4444">Read less, learn more</text>
  <text x="84" y="284" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="24" fill="#fafafa">Summarize, highlight, translate and narrate your PDFs and lectures.</text>
  <text x="84" y="322" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="20" fill="#f87171">Python · Flask · NLTK · gTTS · C# WinForms · NLP</text>
</svg>
